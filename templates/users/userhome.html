{% extends 'users/userbase.html' %}
{% block content %}
{% load static %}

<!-- Carousel Start -->
<div class="container-fluid carousel-header vh-100 px-0">
    <div id="carouselId" class="carousel slide" data-bs-ride="carousel">
        <ol class="carousel-indicators">
            <li data-bs-target="#carouselId" data-bs-slide-to="0" class="active"></li>
            <li data-bs-target="#carouselId" data-bs-slide-to="1"></li>
            <li data-bs-target="#carouselId" data-bs-slide-to="2"></li>
        </ol>
        <div class="carousel-inner" role="listbox">
            <div class="carousel-item active">
                <img src="{% static 'img/traffic_bg.png' %}" class="img-fluid w-100" style="object-fit: cover; height: 100vh;" alt="Traffic Prediction Background">
                <div class="carousel-caption" style="background: rgba(0,0,0,0.5);">
                    <div class="p-3" style="max-width: 900px;">
                        <h4 class="text-white text-uppercase fw-bold mb-4" style="letter-spacing: 3px;"> </h4>
                        <h1 class="display-3 display-md-2 display-lg-1 text-capitalize text-white mb-4">Welcome <span style="color: brown;">{{ name }}</span></h1>
                        <p class="mb-5 fs-5">
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Carousel End -->

{% endblock %}
