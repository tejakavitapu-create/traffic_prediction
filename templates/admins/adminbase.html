{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Method for Scheduling Content Resources Based on 
        Traffic Prediction </title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600&family=Roboto&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/lightbox/css/lightbox.min.css' %}" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    
    <style>
        /* Global Colorful Theme */
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; font-family: 'Jost', sans-serif;}
        .navbar { background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%) !important; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .navbar-brand h1, .navbar-brand h6 { color: #fff !important; font-weight: 800; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); margin: 0;}
        .nav-item.nav-link { color: rgba(255,255,255,0.85) !important; font-weight: 600; margin: 0 5px; transition: all 0.3s; padding: 8px 15px !important;}
        .nav-item.nav-link:hover, .nav-item.nav-link.active { color: #fff !important; background: rgba(255,255,255,0.2); border-radius: 8px; }
        .btn-primary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%) !important; border: none !important; box-shadow: 0 4px 10px rgba(245,87,108,0.3); transition: transform 0.2s; color: white !important;}
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(245,87,108,0.4); }
        .card { border: none !important; border-radius: 12px !important; box-shadow: 0 8px 20px rgba(0,0,0,0.08) !important; background: rgba(255,255,255,0.95) !important; backdrop-filter: blur(5px); }
        .topbar { background: linear-gradient(to right, #0F2027 0%, #203A43 50%, #2C5364 100%) !important; }
        .text-primary { color: #2575fc !important; }
        .bg-light { background-color: transparent !important; } /* Let gradients show */
    </style>
</head>

<body>

    <!-- Spinner Start -->
    <div id="spinner"
        class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-primary" role="status"></div>
    </div>
    <!-- Spinner End -->

    <!-- Navbar start -->
    <div class="container-fluid fixed-top px-0">
        <div class="container px-0">
            <div class="topbar">
                <div class="row align-items-center justify-content-center">
                    <div class="col-md-8">
                        <div class="topbar-info d-flex flex-wrap">
                            <a href="#" class="text-light me-4"><i class="fas fa-envelope text-white me-2"></i>{{ username }}</a>
                            <a href="#" class="text-light"><i class="fas fa-phone-alt text-white me-2"></i>{{ address }}</a>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="topbar-icon d-flex align-items-center justify-content-end">
                        </div>
                    </div>
                </div>
            </div>
            <nav class="navbar navbar-dark navbar-expand-lg px-4 py-2">
                <a href="" class="navbar-brand ms-3">
                    <h1 class="m-0 fs-3 fs-md-2 fs-lg-1">Admin Panel</h1>
                </a>
                <button class="navbar-toggler py-2 px-3 me-3" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarCollapse">
                    <span class="fa fa-bars text-white"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <div class="navbar-nav ms-auto">
                        <a href="" class="nav-item nav-link active" id="nav-home">Home</a>
                        <a href="{% url 'userlist' %}" class="nav-item nav-link" id="nav-user">User List</a>
                        <a href="{% url 'base' %}" class="nav-item nav-link" id="nav-register">Logout</a>
                    </div>
                </div>
            </nav>
        </div>
    </div>
    <!-- Navbar End -->
     

    {% block content %}
    {% endblock %}

    <!-- Back to Top -->
    <a href="#" class="btn btn-primary btn-primary-outline-0 btn-md-square back-to-top"><i class="fa fa-arrow-up"></i></a>

    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'lib/easing/easing.min.js' %}"></script>
    <script src="{% static 'lib/waypoints/waypoints.min.js' %}"></script>
    <script src="{% static 'lib/counterup/counterup.min.js' %}"></script>
    <script src="{% static 'lib/owlcarousel/owl.carousel.min.js' %}"></script>
    <script src="{% static 'lib/lightbox/js/lightbox.min.js' %}"></script>

    <!-- Template Javascript -->
    <script src="{% static 'js/main.js' %}"></script>

    <script>
        $(document).ready(function() {
            // Initially set the home link as active
            $('#nav-home').addClass('active');

            // Attach click event listener to each nav-item
            $('.nav-item').on('click', function() {
                // Remove 'active' class from all nav-items
                $('.nav-item').removeClass('active');

                // Add 'active' class to the clicked nav-item
                $(this).addClass('active');
            });
        });
    </script>
        
</body>

</html>
